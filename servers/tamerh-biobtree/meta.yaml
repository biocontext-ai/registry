applicationCategory: HealthApplication

keywords:
  - Knowledgebase
  - biomedical graph database
  - cross-reference mapping
  - drug discovery
  - genomics
  - proteomics

featureList:
  - Cross-database chain queries (Ensembl >> UniProt >> PDB)
  - Identifier mapping across databases (UniProt, ChEMBL, PDB identifiers)
  - Tissue and cell-type expression analysis (Bgee, CELLxGENE, Expression Atlas, FANTOM5)
  - Drug target and bioactivity lookup (ChEMBL, PubChem, BindingDB, HMDB)
  - Disease-gene associations and clinical variants (ClinVar, MONDO, GenCC, GWAS Catalog, PharmGKB)
  - Protein structure and function (UniProt, AlphaFold, AlphaMissense, PDB, InterPro)
  - Pathway and interaction networks (Reactome, STRING, IntAct, BioGRID, SIGNOR)
  - Gene and variant annotation (Ensembl, HGNC, NCBI Gene, RefSeq, dbSNP)
  - Ontology traversal (GO, EFO, UBERON, MeSH, HPO)

datePublished: "2026-03-11"

operatingSystem:
  - Cross-platform

programmingLanguage:
  - Python
  - Go
